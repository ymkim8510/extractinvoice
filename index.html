<!DOCTYPE html>
<html lang="ko">

<style>
:root{--accent:#10a37f;--accent2:#0d8a6c;--bg:#fff;--soft:#f7f7f8;--border:#e5e5e5;--muted:#666;--warn:#b45309;--warnbg:#fef7ec;--err:#dc2626;--errbg:#fef2f2;--okbg:#e7f6f1;--mono:Consolas,"SF Mono",monospace;--font:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",Arial,sans-serif}*{box-sizing:border-box}body{margin:0;font-family:var(--font);color:#111;background:#fff}.topbar{height:56px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 24px;position:sticky;top:0;background:rgba(255,255,255,.93);z-index:10}.logo{width:26px;height:26px;border-radius:50%;background:var(--accent);color:white;display:grid;place-items:center;font-weight:700}.badge{margin-left:auto;font-size:12px;color:#999;border:1px solid var(--border);background:var(--soft);border-radius:999px;padding:3px 10px}.wrap{max-width:1040px;margin:0 auto;padding:42px 22px 80px}.hero{text-align:center;margin-bottom:30px}.hero h1{font-size:31px;margin:0 0 8px}.hero p{color:var(--muted);margin:0}.card{border:1px solid var(--border);border-radius:16px;padding:23px;margin-bottom:16px;background:white;box-shadow:0 1px 2px rgba(0,0,0,.03),0 4px 12px rgba(0,0,0,.04)}.card-h{display:flex;align-items:center;gap:9px;margin-bottom:15px}.n{width:23px;height:23px;border-radius:50%;background:#f4f4f5;display:grid;place-items:center;color:#666;font-size:12px;font-weight:700}.meta{margin-left:auto;color:#999;font-size:13px}.callout{background:var(--warnbg);color:#7c4a10;border-radius:12px;padding:12px 14px;margin-bottom:15px;font-size:13px}.drop{border:1.5px dashed #d9d9e3;background:var(--soft);border-radius:12px;padding:32px 18px;text-align:center;cursor:pointer}.drop:hover,.drop.over{border-color:var(--accent);background:var(--okbg)}.drop-ico{width:44px;height:44px;margin:0 auto 10px;border-radius:50%;background:white;border:1px solid var(--border);display:grid;place-items:center;font-size:11px;font-weight:700;color:#999}.drop-t{font-weight:700;margin:0}.drop-s{font-size:13px;color:#999;margin:4px 0 0}input[type=file]{display:none}.btn{font:inherit;font-size:14px;font-weight:700;border-radius:9px;padding:10px 18px;border:1px solid transparent;cursor:pointer}.btn-p{background:var(--accent);color:white}.btn-p:hover:not(:disabled){background:var(--accent2)}.btn-p:disabled{background:#f4f4f5;color:#999;cursor:not-allowed}.btn-s{background:white;border-color:#d9d9e3}.files{display:none;flex-direction:column;gap:8px;margin-top:13px}.files.on{display:flex}.file{display:flex;align-items:center;gap:10px;background:var(--soft);border:1px solid var(--border);border-radius:9px;padding:9px 12px}.file-ico{width:36px;height:28px;border-radius:6px;background:var(--errbg);color:var(--err);font-size:9px;font-weight:700;display:grid;place-items:center}.file-ico.master{background:var(--okbg);color:var(--accent)}.file-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13.5px}.file-size{font-family:var(--mono);font-size:12px;color:#999}.file-x{border:0;background:transparent;color:#999;cursor:pointer;font-size:18px}.prog{display:none;margin-top:16px}.prog.on{display:block}.prog-bar{height:6px;background:#f4f4f5;border-radius:999px;overflow:hidden}.prog-fill{height:100%;width:0;background:var(--accent);transition:.25s}.prog-lbl{margin-top:7px;display:flex;justify-content:space-between;font-size:13px;color:#666}.console{display:none;margin-top:15px;background:#f4f4f5;border-radius:12px;padding:13px 15px;font-family:var(--mono);font-size:12.5px;line-height:1.85;max-height:270px;overflow:auto}.console.on{display:block}.c-hd{color:#111;font-weight:700}.c-ok{color:var(--accent)}.c-warn{color:var(--warn)}.c-err{color:var(--err)}.raw-btn{display:none;border:0;background:transparent;color:#999;cursor:pointer;font-size:13px;padding-top:8px}.raw{display:none;margin-top:10px;background:#f4f4f5;border-radius:12px;padding:13px 15px;font-family:var(--mono);font-size:12px;line-height:1.75;max-height:320px;overflow:auto;white-space:pre-wrap;word-break:break-all;color:#666}.raw.on{display:block}#results{display:none}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}.stat{background:var(--soft);border:1px solid var(--border);border-radius:12px;padding:15px 17px}.stat-l{font-size:12px;color:#666;font-weight:700}.stat-v{font-size:26px;font-weight:800}.tbl-wrap{border:1px solid var(--border);border-radius:12px;overflow:hidden}.tbl-scroll{overflow-x:auto}table{width:100%;border-collapse:collapse;min-width:1160px}th{background:var(--soft);font-size:12px;color:#666;text-align:left;padding:10px 12px;border-bottom:1px solid var(--border);white-space:nowrap}td{font-size:13px;padding:9px 12px;border-bottom:1px solid var(--border);white-space:nowrap;max-width:220px;overflow:hidden;text-overflow:ellipsis}td.num{text-align:right;font-family:var(--mono)}td.mono{font-family:var(--mono)}tr.flag td{background:var(--warnbg)}.pill{font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:999px}.pill-ok{background:var(--okbg);color:var(--accent)}.pill-wn{background:#fdeccd;color:var(--warn)}.note{font-size:12.5px;color:#999;margin-bottom:8px}@media(max-width:640px){.stats{grid-template-columns:1fr}.wrap{padding:32px 16px 70px}}
</style>
</head>
<body>
<div class="topbar"><div class="logo">◆</div><b>거래명세서 추출기</b><span class="badge">브라우저에서 처리</span></div>
<div class="wrap">
  <div class="hero"><h1>PDF를 엑셀 원장으로</h1><p>기쁨병원/올헬스는 PDF.js 텍스트 분리 현상을 고려한 좌표/셀 복원 수량 파서를 사용합니다.</p></div>
  <div class="card"><div class="card-h"><span class="n">M</span><h2>Product Master 선택</h2><span class="meta" id="masterMeta">선택 안 됨</span></div><div class="callout">Product Master Excel의 <b>F열 Material code</b>를 기준으로 물품코드를 검증합니다.</div><input type="file" id="masterFi" accept=".xlsx,.xls,.csv"><button class="btn btn-s" onclick="masterFi.click()">Product Master 업로드</button><div class="files" id="masterFiles"></div></div>
  <div class="card"><div class="card-h"><span class="n">1</span><h2>거래명세서 PDF 선택</h2><span class="meta" id="meta1">PDF · 여러 개 가능</span></div><div class="drop" id="drop" onclick="fi.click()"><div class="drop-ico">PDF</div><p class="drop-t">PDF를 끌어다 놓거나 클릭해서 선택</p><p class="drop-s">여러 파일 가능</p></div><input type="file" id="fi" accept=".pdf" multiple><div class="files" id="files"></div></div>
  <div class="card"><div class="card-h"><span class="n">2</span><h2>추출 & 검증</h2><span class="meta" id="meta2">대기 중</span></div><button class="btn btn-p" id="run" disabled onclick="runExtract()">추출 시작</button><div class="prog" id="prog"><div class="prog-bar"><div class="prog-fill" id="progFill"></div></div><div class="prog-lbl"><span id="progLbl"></span><span id="progPct">0%</span></div></div><div class="console" id="console"></div><button class="raw-btn" id="rawBtn" onclick="toggleRaw()">원문 텍스트 보기</button><pre class="raw" id="raw"></pre></div>
  <div class="card" id="results"><div class="card-h"><span class="n">3</span><h2>결과 & 검증 리포트</h2><span class="meta" id="meta3"></span></div><div class="stats" id="stats"></div><p class="note" id="tblNote"></p><div class="tbl-wrap"><div class="tbl-scroll" id="tbl"></div></div><div style="margin-top:17px"><button class="btn btn-p" onclick="downloadXlsx()">엑셀 다운로드</button> <button class="btn btn-s" onclick="resetAll()">새로 시작</button></div></div>
</div>
<script>
'use strict';
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
const OUTPUT_COLUMNS=['거래일자','공급자명','공급자 사업자등록번호','납품처명','납품처 사업자등록번호','물품코드','수량','UOM','EDI Code','Source File','Page','Review Flag','Review Reason'];
const VALID_UOM=new Set(['EA','BOX','BX','DZN','PACK','PAC','PK','SET']);
let files=[],rows=[],rawLines=[],docStats=[];let materialMasterSet=new Set(),materialMasterList=[],materialMasterLoaded=false,masterFileName='';
const clean=v=>String(v??'').replace(/\s+/g,' ').trim();const compact=v=>clean(v).replace(/\s+/g,'');const digitsOnly=v=>String(v??'').replace(/\D/g,'');
function escapeHtml(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function normalizeCompanyName(name){const s=clean(name),c=compact(s);if(c.includes('세원메디'))return'주식회사 세원메디';if(c.includes('주식회사올헬스')||c.includes('올헬스'))return'주식회사 올헬스';return s}
function normalizeMaterialCode(v){return String(v??'').replace(/\u00A0/g,' ').replace(/[()]/g,'').replace(/,$/,'').trim().toUpperCase()}
function normalizeForContains(v){return String(v??'').toUpperCase().replace(/\u00A0/g,' ').replace(/Ⅱ/g,'II').replace(/Ⅲ/g,'III').replace(/Ⅳ/g,'IV').replace(/Ⅴ/g,'V').replace(/[^A-Z0-9]/g,'')}
function normalizeTaxId(s){const d=digitsOnly(s);return d.length===10?`${d.slice(0,3)}-${d.slice(3,5)}-${d.slice(5)}`:clean(s)}
function extractTaxIdsFromText(text){const found=[];function pushTax(raw){const d=digitsOnly(raw);if(d.length===10){const n=normalizeTaxId(d);if(!found.includes(n))found.push(n)}}const source=String(text??'');for(const m of source.match(/\d{3}\s*[-]?\s*\d{2}\s*[-]?\s*\d{5}/g)||[])pushTax(m);for(const m of source.replace(/\s+/g,'').match(/\d{10}/g)||[])pushTax(m);return found}
function pad2(v){return String(v).padStart(2,'0')}function formatYMD(y,m,d){return`${y}-${pad2(m)}-${pad2(d)}`}function extractYearFromFileName(fn){const m=String(fn||'').match(/(20\d{2})/);return m?m[1]:String(new Date().getFullYear())}
function extractDateFromPlainText(text,fileName=''){const s=String(text||'');let m;m=s.match(/(20\d{2})\s*[-./]\s*(\d{1,2})\s*[-./]\s*(\d{1,2})/);if(m)return formatYMD(m[1],m[2],m[3]);m=s.match(/(20\d{2})\s*년\s*(\d{1,2})\s*월\s*(\d{1,2})\s*일/);if(m)return formatYMD(m[1],m[2],m[3]);m=s.match(/\b(20\d{2})(\d{2})(\d{2})\b/);if(m)return formatYMD(m[1],m[2],m[3]);m=s.match(/(\d{1,2})\s*월\s*(\d{1,2})\s*일/);if(m)return formatYMD(extractYearFromFileName(fileName),m[1],m[2]);return''}
function extractDateFromFileName(fn){const s=String(fn||'');let m;m=s.match(/(20\d{2})\s*[-._/]\s*(\d{1,2})\s*[-._/]\s*(\d{1,2})/);if(m)return formatYMD(m[1],m[2],m[3]);m=s.match(/\b(20\d{2})(\d{2})(\d{2})\b/);if(m)return formatYMD(m[1],m[2],m[3]);m=s.match(/(20\d{2})\s*[-._/]\s*(\d{1,2})(?!\d)/);if(m)return formatYMD(m[1],m[2],1);m=s.match(/\b(20\d{2})(\d{2})\b/);if(m)return formatYMD(m[1],m[2],1);m=s.match(/(\d{1,2})\s*월/);if(m)return formatYMD(extractYearFromFileName(s),m[1],1);return''}
function extractTransactionDate(text,fileName=''){const str=String(text||'');const label=/(거래일자|납품일자|납품일|발주일자|발주일|일자|날짜)\s*[:：]?\s*([^\n\r]{0,40})/g;let m;while((m=label.exec(str))!==null){const d=extractDateFromPlainText(m[2]||'',fileName);if(d)return d}return extractDateFromPlainText(str,fileName)||extractDateFromFileName(fileName)||''}
function isUom(s){return VALID_UOM.has(clean(s).toUpperCase())}function normalizeUom(s){return clean(s).toUpperCase()}function isQty(s){return /^\d{1,8}$/.test(clean(s).replace(/,/g,''))}function toQty(s){const t=clean(s).replace(/,/g,'');if(!/^\d+(\.\d+)?$/.test(t))return'';const n=Number(t);return Number.isFinite(n)?n:''}function isRowNo(s){return /^\d{1,4}$/.test(clean(s))}
function isLikelyEdiCode(s){const t=clean(s).replace(/[()]/g,'').replace(/,$/,'');if(!t)return false;if(t==='비보험')return true;if(/^[BMGTAZ]\d{6,}$/i.test(t))return true;if(/^[A-Z]{1,5}\d{2,}[A-Z0-9]*$/i.test(t)&&t.length>=7)return true;if(/^[A-Z0-9]{7,}$/i.test(t)&&/[A-Z]/i.test(t)&&/\d/.test(t))return true;return false}
function isInMaterialMaster(code){if(!materialMasterLoaded)return false;const c=normalizeMaterialCode(code);return !!c&&materialMasterSet.has(c)}
function isLikelyProductCode(s){const t=normalizeMaterialCode(s);if(!t||t==='비보험'||isLikelyEdiCode(t)||/^\d+$/.test(t))return false;if(materialMasterLoaded)return isInMaterialMaster(t);if(/^\d+(CM|MM)$/i.test(t)||/^\d+[A-Z]$/i.test(t))return false;return(/^HAR\d+$/i.test(t)||/^VCP\d+[A-Z]?$/i.test(t)||/^W\d+[A-Z]?$/i.test(t)||/^MCS\d+$/i.test(t)||/^ANX\d+$/i.test(t)||/^SX[A-Z0-9]+$/i.test(t)||/^GST\d+[A-Z]?$/i.test(t)||/^ECR\d+[A-Z]?$/i.test(t)||/^EZ\d+[A-Z]?$/i.test(t)||/^EL\d/i.test(t)||/^PMW\d+/i.test(t)||/^\d{4}[A-Z]$/i.test(t))}
function pickEdiFromTokens(tokens){for(const token of tokens){for(const p of clean(token).split(/\s+/).filter(Boolean)){const t=p.replace(/[()]/g,'').replace(/,$/,'');if(isLikelyEdiCode(t))return t}}return''}
function pickMaterialCodeByMaster(candidates){if(!materialMasterLoaded)return'';for(const c of candidates){const code=normalizeMaterialCode(c);if(code&&materialMasterSet.has(code))return code}return''}
function findMaterialCodeInText(text){if(!materialMasterLoaded)return'';const raw=String(text??'');for(const token of raw.split(/[\s,\/;:()\[\]{}]+/).map(normalizeMaterialCode).filter(Boolean)){if(materialMasterSet.has(token))return token}const normText=normalizeForContains(raw);for(const code of materialMasterList){const c=normalizeMaterialCode(code);if(!c||/^\d+$/.test(c)||c.length<4)continue;if(normText.includes(normalizeForContains(c)))return c}return''}
function findMasterCodeInLine(lineText){return findMaterialCodeInText(lineText)}
function fillBlankMaterialCodes(items,lines){if(!materialMasterLoaded)return;const hits=[];for(let i=0;i<lines.length;i++){const code=findMasterCodeInLine(lines[i]);if(code)hits.push({code,line:i,used:false})}for(const it of items){if(it.materialCode||it._start==null)continue;let best=-1,bestDist=999;for(let h=0;h<hits.length;h++){if(hits[h].used)continue;const d=Math.min(Math.abs(hits[h].line-it._start),Math.abs(hits[h].line-it._end));if(d<=3&&d<bestDist){best=h;bestDist=d}}if(best>=0){it.materialCode=hits[best].code;hits[best].used=true}}}
function cleanupCompanyName(name){let s=clean(name).replace(/^[:：\-]+/,'').replace(/\s*성명.*$/,'').replace(/\s*대표.*$/,'').replace(/\s*사업장.*$/,'').trim();if(!s)return'';const bad=['공급자','공급받는자','사업자등록번호','등록번호','상호','상 호','성명','업태','종목'];if(bad.some(b=>compact(s)===compact(b)))return'';return normalizeCompanyName(s)}
function blankHeader(){return{transactionDate:'',supplierName:'',supplierTaxId:'',endUserName:'',endUserTaxId:''}}function mergeHeader(prev,cur){return{transactionDate:cur.transactionDate||prev.transactionDate||'',supplierName:normalizeCompanyName(cur.supplierName||prev.supplierName||''),supplierTaxId:cur.supplierTaxId||prev.supplierTaxId||'',endUserName:normalizeCompanyName(cur.endUserName||prev.endUserName||''),endUserTaxId:cur.endUserTaxId||prev.endUserTaxId||''}}
async function loadProductMasterFile(file){const ab=await file.arrayBuffer();const wb=XLSX.read(ab,{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});const set=new Set();for(let r=0;r<data.length;r++){const code=normalizeMaterialCode(data[r][5]);if(!code||['MATERIAL CODE','MATERIAL','MATERIALCODE'].includes(code))continue;set.add(code)}materialMasterSet=set;materialMasterList=[...set].filter(Boolean).sort((a,b)=>b.length-a.length);materialMasterLoaded=set.size>0;masterFileName=file.name;masterMeta.textContent=materialMasterLoaded?`${file.name} · ${set.size.toLocaleString()}개 코드`:`${file.name} · 코드 없음`;renderMasterFile(file);say(`Product Master 로드 완료 — F열 Material code ${set.size.toLocaleString()}개`,materialMasterLoaded?'ok':'warn')}
function renderMasterFile(file){masterFiles.innerHTML='';if(!file){masterFiles.classList.remove('on');return}const d=document.createElement('div');d.className='file';d.innerHTML=`<span class="file-ico master">XLSX</span><span class="file-name">${escapeHtml(file.name)}</span><span class="file-size">${(file.size/1024).toFixed(0)} KB</span><button class="file-x" onclick="clearMaster()">×</button>`;masterFiles.appendChild(d);masterFiles.classList.add('on')}
function clearMaster(){materialMasterSet=new Set();materialMasterList=[];materialMasterLoaded=false;masterFileName='';masterFi.value='';masterMeta.textContent='선택 안 됨';renderMasterFile(null)}
async function readPdfPages(file){const ab=await file.arrayBuffer();const pdf=await pdfjsLib.getDocument({data:ab}).promise;const pages=[];for(let p=1;p<=pdf.numPages;p++){const page=await pdf.getPage(p);const viewport=page.getViewport({scale:1});const tc=await page.getTextContent();const items=[];for(const it of tc.items){const str=clean(it.str);if(!str)continue;const x=it.transform[4],y=it.transform[5],fs=Math.max(Math.abs(it.transform[0]),Math.abs(it.transform[3]))||10,w=it.width&&it.width>0?it.width:fs*str.length*.55;items.push({str,x,y,w,fs})}pages.push({pageNo:p,width:viewport.width,height:viewport.height,items,lines:groupItemsToLines(items)})}return pages}
function groupItemsToLines(items){const sorted=[...items].sort((a,b)=>b.y-a.y||a.x-b.x),groups=[];for(const it of sorted){const tol=Math.max(2.5,it.fs*.45);let g=groups.find(x=>Math.abs(x.y-it.y)<=tol);if(!g){g={y:it.y,items:[]};groups.push(g)}g.items.push(it);g.y=g.items.reduce((s,v)=>s+v.y,0)/g.items.length}groups.sort((a,b)=>b.y-a.y);for(const g of groups){g.items.sort((a,b)=>a.x-b.x);g.text=clean(g.items.map(x=>x.str).join(' '))}return groups}

const filesEl=document.getElementById('files');function renderFiles(){filesEl.innerHTML='';files.forEach((f,i)=>{const d=document.createElement('div');d.className='file';d.innerHTML=`<span class="file-ico">PDF</span><span class="file-name">${escapeHtml(f.name)}</span><span class="file-size">${(f.size/1024).toFixed(0)} KB</span><button class="file-x" onclick="removeFile(${i})">×</button>`;filesEl.appendChild(d)});filesEl.classList.toggle('on',files.length>0);run.disabled=files.length===0;meta1.textContent=files.length?`${files.length}개 선택됨`:'PDF · 여러 개 가능'}
function say(msg,cls=''){consoleEl.classList.add('on');const d=document.createElement('div');d.className='c-line'+(cls?' c-'+cls:'');d.textContent=msg;consoleEl.appendChild(d);consoleEl.scrollTop=consoleEl.scrollHeight}const consoleEl=document.getElementById('console');function prog(pct,label=''){progEl.classList.add('on');if(pct!=null){progFill.style.width=pct+'%';progPct.textContent=pct+'%'}if(label)progLbl.textContent=label}const progEl=document.getElementById('prog');function toggleRaw(){const on=raw.classList.toggle('on');rawBtn.textContent=on?'원문 텍스트 숨기기':'원문 텍스트 보기'}
async function runExtract(){if(!files.length)return;run.disabled=true;consoleEl.innerHTML='';results.style.display='none';raw.textContent='';rawBtn.style.display='none';meta2.textContent='처리 중…';rows=[];rawLines=[];docStats=[];try{const loaded=[];let totalPages=0;for(const f of files){const pages=await readPdfPages(f);loaded.push({file:f,pages});totalPages+=pages.length}say(`${files.length}개 파일 · 총 ${totalPages}페이지 처리 시작`,'hd');say(materialMasterLoaded?`Product Master 적용 중 — ${materialMasterSet.size.toLocaleString()}개 Material Code`:'Product Master가 로드되지 않았습니다. fallback 기준으로 추출합니다.',materialMasterLoaded?'ok':'warn');prog(0,'준비 중');let done=0;for(const pack of loaded){say(`\n📄 ${pack.file.name} (${pack.pages.length}페이지)`,'hd');let carry=blankHeader();for(const page of pack.pages){prog(Math.round(done/Math.max(totalPages,1)*95),`${pack.file.name} — p${page.pageNo}`);rawLines.push(`\n${'─'.repeat(54)}\n${pack.file.name} — p${page.pageNo}\n${'─'.repeat(54)}`,...page.lines.map(x=>x.text));carry=extractHeader(page,carry,pack.file.name);const before=rows.length;for(const item of parseItems(page)){const r=buildOutputRow(carry,item,pack.file.name,page.pageNo);if(r['거래일자']||r['물품코드']||r['수량']||r['UOM']||r['EDI Code'])rows.push(r)}const added=rows.length-before;docStats.push({file:pack.file.name,page:page.pageNo,itemCount:added});say(`p${page.pageNo}: ${added}개 품목`,added?'ok':'warn');done++}}prog(100,'완료');const flagged=rows.filter(r=>r['Review Flag']==='Y').length;say(`\n완료 — 총 ${rows.length}개 품목`,rows.length?'ok':'warn');if(flagged)say(`${flagged}개는 확인이 필요합니다`,'warn');if(!rows.length)say('추출된 품목이 없습니다. 원문 텍스트 보기에서 PDF 텍스트 구조를 확인하세요.','warn');meta2.textContent='완료';raw.textContent=rawLines.join('\n');rawBtn.style.display='block';renderResults(totalPages)}catch(e){console.error(e);say(`오류: ${e.message||e}`,'err');meta2.textContent='오류'}finally{run.disabled=false}}
function renderResults(totalPages){const flagged=rows.filter(r=>r['Review Flag']==='Y').length,normal=rows.length-flagged;stats.innerHTML=`<div class="stat"><div class="stat-l">추출된 품목</div><div class="stat-v">${rows.length}<span class="u">개</span></div></div><div class="stat"><div class="stat-l">정상</div><div class="stat-v">${normal}<span class="u">개</span></div></div><div class="stat"><div class="stat-l">확인 필요</div><div class="stat-v">${flagged}<span class="u">개</span></div></div>`;const C=[['거래일자','mono'],['공급자명',''],['공급자 사업자등록번호','mono'],['납품처명',''],['납품처 사업자등록번호','mono'],['물품코드','mono'],['수량','num'],['UOM','mono'],['EDI Code','mono'],['Source File',''],['Page','num'],['Review Flag','']];const preview=rows.slice(0,300);meta3.textContent=`${rows.length}개`;tblNote.textContent=rows.length>300?`앞 300개만 표시 — 엑셀에는 전체 ${rows.length}개가 담깁니다`:`전체 ${rows.length}개`;let html='<table><thead><tr>';for(const [name]of C)html+=`<th>${escapeHtml(name)}</th>`;html+='</tr></thead><tbody>';for(const r of preview){const flag=r['Review Flag']==='Y';html+=`<tr class="${flag?'flag':''}">`;for(const [name,cls]of C){const v=r[name]==null?'':String(r[name]);if(name==='Review Flag')html+=flag?`<td><span class="pill pill-wn" title="${escapeHtml(r['Review Reason']||'')}">확인 필요</span></td>`:`<td><span class="pill pill-ok">정상</span></td>`;else html+=`<td class="${cls}${v?'':' dim'}" title="${escapeHtml(v)}">${v?escapeHtml(v):'—'}</td>`}html+='</tr>'}html+='</tbody></table>';tbl.innerHTML=html;results.style.display='block';results.scrollIntoView({behavior:'smooth',block:'start'})}
function downloadXlsx(){if(!rows.length){alert('다운로드할 추출 결과가 없습니다.');return}const wb=XLSX.utils.book_new();const data=rows.map(r=>{const o={};for(const c of OUTPUT_COLUMNS)o[c]=r[c]??'';return o});const ws=XLSX.utils.json_to_sheet(data,{header:OUTPUT_COLUMNS});ws['!cols']=[{wch:14},{wch:24},{wch:22},{wch:24},{wch:22},{wch:24},{wch:10},{wch:10},{wch:18},{wch:34},{wch:8},{wch:12},{wch:55}];XLSX.utils.book_append_sheet(wb,ws,'전체');for(const eu of [...new Set(rows.map(r=>r['납품처명']||'미분류'))]){const subset=rows.filter(r=>(r['납품처명']||'미분류')===eu);let name=String(eu||'미분류').replace(/[:\\/?*\[\]]/g,'').trim().slice(0,31)||'미분류';XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(subset.map(r=>{const o={};for(const c of OUTPUT_COLUMNS)o[c]=r[c]??'';return o}),{header:OUTPUT_COLUMNS}),name)}const today=new Date();XLSX.writeFile(wb,`invoice_extracted_${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}.xlsx`)}
function resetAll(){files=[];rows=[];rawLines=[];docStats=[];fi.value='';renderFiles();consoleEl.innerHTML='';consoleEl.classList.remove('on');progEl.classList.remove('on');results.style.display='none';raw.classList.remove('on');rawBtn.style.display='none';meta2.textContent='대기 중';progFill.style.width='0%';progPct.textContent='0%';scrollTo({top:0,behavior:'smooth'})}
</script>
