<script>
'use strict';

pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const OUTPUT_COLUMNS = [
  '공급자명',
  '공급자 사업자등록번호',
  '납품처명',
  '납품처 사업자등록번호',
  '물품코드(규격)',
  '수량',
  'UOM',
  'EDI Code',
  'Source File',
  'Page',
  'Review Flag',
  'Review Reason'
];

const VALID_UOM = new Set(['EA', 'BOX', 'PACK', 'PAC', 'PK', 'SET']);
const EDI_PATTERN = /^(비보험|[A-Z][A-Z0-9]{6,}|[BMGT]\d{6,})$/i;

let files = [];
let rows = [];
let rawLines = [];
let docStats = [];

const clean = v => String(v ?? '').replace(/\s+/g, ' ').trim();
const compact = v => clean(v).replace(/\s+/g, '');
const digitsOnly = v => String(v ?? '').replace(/\D/g, '');

function escapeHtml(s){
  return String(s ?? '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function isTaxId(s){
  return digitsOnly(s).length === 10;
}

function normalizeTaxId(s){
  const d = digitsOnly(s);
  if(d.length !== 10) return clean(s);
  return `${d.slice(0,3)}-${d.slice(3,5)}-${d.slice(5)}`;
}

function isUom(s){
  return VALID_UOM.has(clean(s).toUpperCase());
}

function isEdiCode(s){
  return EDI_PATTERN.test(clean(s));
}

function isRowNo(s){
  return /^\d{1,4}$/.test(clean(s));
}

function isQty(s){
  return /^\d{1,6}$/.test(clean(s).replace(/,/g,''));
}

function toQty(s){
  const n = Number(clean(s).replace(/,/g,''));
  return Number.isFinite(n) ? n : '';
}

function blankHeader(){
  return {
    supplierName: '',
    supplierTaxId: '',
    endUserName: '',
    endUserTaxId: ''
  };
}

function mergeHeader(prev, cur){
  return {
    supplierName: cur.supplierName || prev.supplierName || '',
    supplierTaxId: cur.supplierTaxId || prev.supplierTaxId || '',
    endUserName: cur.endUserName || prev.endUserName || '',
    endUserTaxId: cur.endUserTaxId || prev.endUserTaxId || ''
  };
}

async function readPdfPages(file){
  const ab = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data: ab}).promise;
  const pages = [];

  for(let p = 1; p <= pdf.numPages; p++){
    const page = await pdf.getPage(p);
    const tc = await page.getTextContent();
    const viewport = page.getViewport({scale: 1});

    const items = [];

    for(const it of tc.items){
      const str = clean(it.str);
      if(!str) continue;

      const x = it.transform[4];
      const y = it.transform[5];
      const fs = Math.max(Math.abs(it.transform[0]), Math.abs(it.transform[3])) || 10;
      const w = it.width && it.width > 0 ? it.width : fs * str.length * 0.55;

      items.push({str, x, y, w, fs});
    }

    const lines = groupItemsToLines(items);
    pages.push({
      pageNo: p,
      width: viewport.width,
      height: viewport.height,
      items,
      lines
    });
  }

  return pages;
}

function groupItemsToLines(items){
  const sorted = [...items].sort((a,b) => b.y - a.y || a.x - b.x);
  const groups = [];

  for(const it of sorted){
    const tol = Math.max(2.5, it.fs * 0.45);
    let g = groups.find(x => Math.abs(x.y - it.y) <= tol);

    if(!g){
      g = {y: it.y, items: []};
      groups.push(g);
    }

    g.items.push(it);
    g.y = g.items.reduce((s,v) => s + v.y, 0) / g.items.length;
  }

  groups.sort((a,b) => b.y - a.y);

  for(const g of groups){
    g.items.sort((a,b) => a.x - b.x);
    g.text = clean(g.items.map(x => x.str).join(' '));
  }

  return groups;
}

function extractHeader(page, previousHeader){
  const result = blankHeader();

  for(const line of page.lines){
    const text = clean(line.text);
    const c = compact(text);

    const taxIds = [];
    for(const it of line.items){
      if(isTaxId(it.str)) taxIds.push({value: normalizeTaxId(it.str), x: it.x});
    }

    if(taxIds.length >= 2){
      taxIds.sort((a,b) => a.x - b.x);
      if(!result.supplierTaxId) result.supplierTaxId = taxIds[0].value;
      if(!result.endUserTaxId) result.endUserTaxId = taxIds[taxIds.length - 1].value;
    }

    if(c.includes('상호')){
      const foundNames = extractCompanyNamesFromLine(line);
      if(foundNames.length >= 1 && !result.supplierName) result.supplierName = foundNames[0];
      if(foundNames.length >= 2 && !result.endUserName) result.endUserName = foundNames[1];
    }

    if(!result.endUserName && text.includes('서울아산병원')){
      result.endUserName = '서울아산병원';
    }

    if(!result.endUserName && (text.includes('국립암센터') || text.includes('국립암센타'))){
      result.endUserName = text.includes('국립암센타') ? '국립암센타' : '국립암센터';
    }

    if(!result.supplierName && text.includes('주식회사 세원메디')){
      result.supplierName = '주식회사 세원메디';
    }

    if(!result.supplierName && text.includes('아산메디칼')){
      result.supplierName = text.includes('(주)아산메디칼') ? '(주)아산메디칼' : '아산메디칼';
    }
  }

  return mergeHeader(previousHeader, result);
}

function extractCompanyNamesFromLine(line){
  const items = [...line.items].sort((a,b) => a.x - b.x);
  const names = [];

  for(let i = 0; i < items.length; i++){
    const t = compact(items[i].str);

    if(t.includes('상호')){
      for(let j = i + 1; j < items.length; j++){
        const candidate = clean(items[j].str);
        const cc = compact(candidate);

        if(!candidate) continue;
        if(cc.includes('성명')) break;
        if(cc.includes('상호')) break;
        if(cc.includes('사업자등록번호')) break;
        if(cc.includes('공급자')) continue;
        if(cc.includes('공급받는자')) continue;

        names.push(candidate);
        break;
      }
    }
  }

  return names.filter(Boolean);
}

function detectTableHeader(page){
  for(const line of page.lines){
    const c = compact(line.text);

    const isHeader =
      c.includes('번호') &&
      (
        c.includes('물품코드') ||
        c.includes('EDI코드') ||
        c.includes('품명') ||
        c.includes('물품명')
      ) &&
      (
        c.includes('수량') ||
        c.includes('단위')
      );

    if(!isHeader) continue;

    const xs = {};
    const items = [...line.items].sort((a,b) => a.x - b.x);

    for(const it of items){
      const t = compact(it.str);

      if(t.includes('번호') && xs.no == null) xs.no = it.x;
      else if(t.includes('물품코드') && xs.itemCode == null) xs.itemCode = it.x;
      else if(t.includes('EDI코드') && xs.edi == null) xs.edi = it.x;
      else if((t.includes('품명') || t.includes('물품명')) && xs.desc == null) xs.desc = it.x;
      else if(t.includes('규격') && xs.spec == null) xs.spec = it.x;
      else if(t.includes('단위') && xs.uom == null) xs.uom = it.x;
      else if(t.includes('수량') && xs.qty == null) xs.qty = it.x;
      else if(t.includes('단가') && xs.price == null) xs.price = it.x;
      else if(t.includes('금액') && xs.amount == null) xs.amount = it.x;
      else if(t.includes('비고') && xs.remark == null) xs.remark = it.x;
    }

    if(xs.no != null) return normalizeHeaderXs(xs);
  }

  return null;
}

function normalizeHeaderXs(xs){
  const pairs = Object.entries(xs)
    .filter(([,x]) => x != null)
    .sort((a,b) => a[1] - b[1]);

  const bounds = [];

  for(let i = 0; i < pairs.length; i++){
    const key = pairs[i][0];
    const x = pairs[i][1];
    const left = i === 0 ? -Infinity : (pairs[i-1][1] + x) / 2;
    const right = i === pairs.length - 1 ? Infinity : (x + pairs[i+1][1]) / 2;
    bounds.push({key, x, left, right});
  }

  return {xs, bounds};
}

function splitLineByColumns(line, header){
  const cells = {
    no: '',
    itemCode: '',
    edi: '',
    desc: '',
    spec: '',
    uom: '',
    qty: '',
    price: '',
    amount: '',
    remark: ''
  };

  for(const it of line.items){
    const b = header.bounds.find(x => it.x >= x.left && it.x < x.right);
    if(!b) continue;
    cells[b.key] = clean(cells[b.key] + ' ' + it.str);
  }

  return cells;
}

function findEdiFromTexts(texts){
  for(const t of texts){
    const parts = clean(t).split(/\s+/);
    for(const p of parts){
      if(isEdiCode(p)) return clean(p);
    }
  }
  return '';
}

function parseItemsByPosition(page){
  const header = detectTableHeader(page);
  if(!header) return [];

  const out = [];
  let started = false;
  let current = null;

  function finalize(){
    if(!current) return;

    current.spec = clean(current.spec);
    current.uom = clean(current.uom).toUpperCase();
    current.qty = toQty(current.qty);
    current.edi = clean(current.edi);

    if(current.spec || current.qty || current.uom || current.edi){
      out.push(current);
    }

    current = null;
  }

  for(const line of page.lines){
    const c = compact(line.text);

    if(
      c.includes('번호') &&
      (
        c.includes('물품코드') ||
        c.includes('EDI코드') ||
        c.includes('품명') ||
        c.includes('물품명')
      )
    ){
      started = true;
      finalize();
      continue;
    }

    if(!started) continue;

    if(c.includes('검수') || c.includes('담당부서장') || c.includes('합계금액')){
      finalize();
      break;
    }

    const cells = splitLineByColumns(line, header);
    const allTexts = line.items.map(x => clean(x.str)).filter(Boolean);

    let rowNo = clean(cells.no);

    if(!isRowNo(rowNo)){
      const possible = allTexts.find(isRowNo);
      if(possible) rowNo = possible;
    }

    if(isRowNo(rowNo)){
      finalize();

      let spec = clean(cells.spec);
      let qty = clean(cells.qty);
      let uom = clean(cells.uom);
      let edi = clean(cells.edi || cells.price || cells.remark);

      if(!uom){
        const u = allTexts.find(isUom);
        if(u) uom = u;
      }

      if(!qty){
        const uomIndex = allTexts.findIndex(isUom);
        if(uomIndex >= 0 && allTexts[uomIndex + 1] && isQty(allTexts[uomIndex + 1])){
          qty = allTexts[uomIndex + 1];
        } else {
          const q = allTexts.find(x => isQty(x) && x !== rowNo);
          if(q) qty = q;
        }
      }

      if(!edi){
        edi = findEdiFromTexts([
          cells.edi,
          cells.price,
          cells.amount,
          cells.remark,
          ...allTexts
        ]);
      }

      current = {
        rowNo: Number(rowNo),
        spec,
        qty,
        uom,
        edi
      };

      continue;
    }

    if(current){
      const edi = findEdiFromTexts([
        cells.edi,
        cells.price,
        cells.amount,
        cells.remark,
        line.text
      ]);

      if(edi && !current.edi) current.edi = edi;

      if(cells.spec && !current.spec){
        current.spec = cells.spec;
      }

      if(cells.qty && !current.qty){
        current.qty = cells.qty;
      }

      if(cells.uom && !current.uom){
        current.uom = cells.uom;
      }
    }
  }

  finalize();
  return out;
}

function parseItemsByTextFallback(page){
  const out = [];
  let inTable = false;
  let current = null;

  function finalize(){
    if(!current) return;

    current.spec = clean(current.spec);
    current.uom = clean(current.uom).toUpperCase();
    current.qty = toQty(current.qty);
    current.edi = clean(current.edi);

    if(current.spec || current.qty || current.uom || current.edi){
      out.push(current);
    }

    current = null;
  }

  for(const line of page.lines){
    const text = clean(line.text);
    const c = compact(text);

    if(
      c.includes('번호') &&
      (
        c.includes('물품코드') ||
        c.includes('EDI코드') ||
        c.includes('품명') ||
        c.includes('물품명')
      )
    ){
      inTable = true;
      finalize();
      continue;
    }

    if(!inTable) continue;

    if(c.includes('검수') || c.includes('담당부서장')){
      finalize();
      break;
    }

    const parts = text.split(/\s+/).filter(Boolean);
    const rowIdx = parts.findIndex(isRowNo);

    if(rowIdx >= 0){
      finalize();

      const after = parts.slice(rowIdx + 1);
      const uomIdx = after.findIndex(isUom);
      const edi = findEdiFromTexts(after);
      let uom = '';
      let qty = '';
      let spec = '';

      if(uomIdx >= 0){
        uom = after[uomIdx];
        if(after[uomIdx + 1] && isQty(after[uomIdx + 1])) qty = after[uomIdx + 1];

        if(uomIdx >= 1){
          spec = after[uomIdx - 1];
        }
      }

      if(!spec){
        const likelySpec = after.find(x => /[A-Za-z0-9]/.test(x) && !isEdiCode(x) && !isUom(x) && !isQty(x));
        if(likelySpec) spec = likelySpec;
      }

      current = {
        rowNo: Number(parts[rowIdx]),
        spec,
        qty,
        uom,
        edi
      };

      continue;
    }

    if(current){
      const edi = findEdiFromTexts(parts);
      if(edi && !current.edi) current.edi = edi;

      const u = parts.find(isUom);
      if(u && !current.uom) current.uom = u;

      const q = parts.find(isQty);
      if(q && !current.qty) current.qty = q;
    }
  }

  finalize();
  return out;
}

function parseItems(page){
  const byPosition = parseItemsByPosition(page);
  if(byPosition.length) return byPosition;

  return parseItemsByTextFallback(page);
}

function buildOutputRow(header, item, fileName, pageNo){
  const r = {
    '공급자명': header.supplierName || '',
    '공급자 사업자등록번호': header.supplierTaxId || '',
    '납품처명': header.endUserName || '',
    '납품처 사업자등록번호': header.endUserTaxId || '',
    '물품코드(규격)': item.spec || '',
    '수량': item.qty ?? '',
    'UOM': item.uom || '',
    'EDI Code': item.edi || '',
    'Source File': fileName,
    'Page': pageNo
  };

  const reasons = [];

  if(!r['공급자명']) reasons.push('공급자명 누락');
  if(!r['공급자 사업자등록번호']) reasons.push('공급자 사업자등록번호 누락');
  if(!r['납품처명']) reasons.push('납품처명 누락');
  if(!r['납품처 사업자등록번호']) reasons.push('납품처 사업자등록번호 누락');
  if(!r['물품코드(규격)']) reasons.push('물품코드/규격 누락');
  if(!r['수량']) reasons.push('수량 누락');
  if(!r['UOM']) reasons.push('UOM 누락');
  if(!r['EDI Code']) reasons.push('EDI Code 누락');

  r['Review Flag'] = reasons.length ? 'Y' : 'N';
  r['Review Reason'] = reasons.join('; ');

  return r;
}

const drop = document.getElementById('drop');
const fi = document.getElementById('fi');

drop.addEventListener('dragover', e => {
  e.preventDefault();
  drop.classList.add('over');
});

drop.addEventListener('dragleave', () => {
  drop.classList.remove('over');
});

drop.addEventListener('drop', e => {
  e.preventDefault();
  drop.classList.remove('over');
  addFiles([...e.dataTransfer.files].filter(f =>
    f.type === 'application/pdf' || f.name.toLowerCase().endsWith('.pdf')
  ));
});

fi.addEventListener('change', () => addFiles([...fi.files]));

function addFiles(arr){
  arr.forEach(f => {
    if(!files.find(x => x.name === f.name && x.size === f.size)){
      files.push(f);
    }
  });
  renderFiles();
}

function removeFile(i){
  files.splice(i,1);
  renderFiles();
}

function renderFiles(){
  const el = document.getElementById('files');
  el.innerHTML = '';

  files.forEach((f,i) => {
    const d = document.createElement('div');
    d.className = 'file';
    d.innerHTML =
      `<span class="file-ico">PDF</span>
       <span class="file-name">${escapeHtml(f.name)}</span>
       <span class="file-size">${(f.size/1024).toFixed(0)} KB</span>
       <button class="file-x" onclick="removeFile(${i})" aria-label="제거">✕</button>`;
    el.appendChild(d);
  });

  el.classList.toggle('on', files.length > 0);
  document.getElementById('run').disabled = files.length === 0;
  document.getElementById('meta1').textContent =
    files.length ? `${files.length}개 선택됨` : 'PDF · 여러 개 가능';
}

function say(msg, cls=''){
  const c = document.getElementById('console');
  c.classList.add('on');

  const d = document.createElement('div');
  d.className = 'c-line' + (cls ? ' c-' + cls : '');
  d.textContent = msg;
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}

function prog(pct, label=''){
  document.getElementById('prog').classList.add('on');

  if(pct != null){
    document.getElementById('progFill').style.width = pct + '%';
    document.getElementById('progPct').textContent = pct + '%';
  }

  if(label) document.getElementById('progLbl').textContent = label;
}

function toggleRaw(){
  const r = document.getElementById('raw');
  const on = r.classList.toggle('on');
  document.getElementById('rawBtn').textContent =
    on ? '원문 텍스트 숨기기' : '원문 텍스트 보기';
}

async function runExtract(){
  if(!files.length) return;

  const btn = document.getElementById('run');
  btn.disabled = true;

  document.getElementById('console').innerHTML = '';
  document.getElementById('results').style.display = 'none';
  document.getElementById('raw').textContent = '';
  document.getElementById('rawBtn').style.display = 'none';
  document.getElementById('meta2').textContent = '처리 중…';

  rows = [];
  rawLines = [];
  docStats = [];

  try{
    const loaded = [];
    let totalPages = 0;

    for(const f of files){
      const pages = await readPdfPages(f);
      loaded.push({file: f, pages});
      totalPages += pages.length;
    }

    say(`${files.length}개 파일 · 총 ${totalPages}페이지 처리 시작`, 'hd');
    prog(0, '준비 중');

    let done = 0;

    for(const pack of loaded){
      const f = pack.file;
      const pages = pack.pages;

      say(`\n📄 ${f.name} (${pages.length}페이지)`, 'hd');

      let carryHeader = blankHeader();

      for(const page of pages){
        prog(Math.round(done / Math.max(totalPages, 1) * 95), `${f.name} — p${page.pageNo}`);

        rawLines.push(`\n${'─'.repeat(54)}\n${f.name} — p${page.pageNo}\n${'─'.repeat(54)}`);
        rawLines.push(...page.lines.map(x => x.text));

        carryHeader = extractHeader(page, carryHeader);

        const items = parseItems(page);
        const before = rows.length;

        for(const item of items){
          const outRow = buildOutputRow(carryHeader, item, f.name, page.pageNo);

          if(
            outRow['물품코드(규격)'] ||
            outRow['수량'] ||
            outRow['UOM'] ||
            outRow['EDI Code']
          ){
            rows.push(outRow);
          }
        }

        const added = rows.length - before;

        docStats.push({
          file: f.name,
          page: page.pageNo,
          itemCount: added
        });

        say(`p${page.pageNo}: ${added}개 품목`, added ? 'ok' : 'warn');
        done++;
      }
    }

    prog(100, '완료');

    const flagged = rows.filter(r => r['Review Flag'] === 'Y').length;

    say(`\n완료 — 총 ${rows.length}개 품목`, rows.length ? 'ok' : 'warn');
    if(flagged) say(`${flagged}개는 확인이 필요합니다`, 'warn');
    if(!rows.length) say('추출된 품목이 없습니다. 원문 텍스트 보기에서 PDF 텍스트 구조를 확인하세요.', 'warn');

    document.getElementById('meta2').textContent = '완료';
    document.getElementById('raw').textContent = rawLines.join('\n');
    document.getElementById('rawBtn').style.display = 'block';

    renderResults(totalPages);

  } catch(err){
    console.error(err);
    say(`오류: ${err.message || err}`, 'err');
    document.getElementById('meta2').textContent = '오류';
  } finally {
    btn.disabled = false;
  }
}

function renderVerification(totalPages){
  const pagesWithData = docStats.filter(d => d.itemCount > 0).length;
  const flagged = rows.filter(r => r['Review Flag'] === 'Y').length;
  const failed = rows.length === 0;

  const head =
    `<div class="verify-head ${failed ? 'warn' : 'pass'}">
      <div class="verify-badge">${failed ? '!' : '✓'}</div>
      <div>
        <div class="verify-title">${failed ? '추출 결과 없음' : '추출 완료'}</div>
        <div class="verify-sub">전체 ${totalPages}페이지 중 ${pagesWithData}페이지에서 품목을 읽었습니다.</div>
      </div>
    </div>`;

  let body = '<div class="verify-body">';

  body +=
    `<div class="check">
      <div class="check-mark ${rows.length ? 'ok' : 'no'}">${rows.length ? '✓' : '!'}</div>
      <div class="check-body">
        <div class="check-name">품목 추출</div>
        <div class="check-detail">총 ${rows.length}개 품목이 추출되었습니다.</div>
      </div>
    </div>`;

  body +=
    `<div class="check">
      <div class="check-mark ${flagged ? 'no' : 'ok'}">${flagged ? '!' : '✓'}</div>
      <div class="check-body">
        <div class="check-name">필수값 확인</div>
        <div class="check-detail">${flagged ? `${flagged}개 품목은 일부 필드 확인이 필요합니다.` : '필수값 누락이 없습니다.'}</div>
      </div>
    </div>`;

  body += '</div>';

  document.getElementById('verify').innerHTML = head + body;
}

function renderResults(totalPages){
  renderVerification(totalPages);

  const flagged = rows.filter(r => r['Review Flag'] === 'Y').length;
  const normal = rows.length - flagged;

  document.getElementById('stats').innerHTML =
    `<div class="stat">
      <div class="stat-l">추출된 품목</div>
      <div class="stat-v">${rows.length}<span class="u">개</span></div>
    </div>
    <div class="stat ok">
      <div class="stat-l">정상</div>
      <div class="stat-v">${normal}<span class="u">개</span></div>
    </div>
    <div class="stat ${flagged ? 'warn' : 'ok'}">
      <div class="stat-l">확인 필요</div>
      <div class="stat-v">${flagged}<span class="u">개</span></div>
    </div>`;

  const C = [
    ['공급자명',''],
    ['공급자 사업자등록번호','mono'],
    ['납품처명',''],
    ['납품처 사업자등록번호','mono'],
    ['물품코드(규격)','mono'],
    ['수량','num'],
    ['UOM','mono'],
    ['EDI Code','mono'],
    ['Source File',''],
    ['Page','num'],
    ['Review Flag','']
  ];

  const preview = rows.slice(0, 300);

  document.getElementById('meta3').textContent = `${rows.length}개`;
  document.getElementById('tblNote').textContent =
    rows.length > 300
      ? `앞 300개만 표시 — 엑셀에는 전체 ${rows.length}개가 담깁니다`
      : `전체 ${rows.length}개`;

  let html = '<table><thead><tr>';

  for(const [name] of C){
    html += `<th>${escapeHtml(name)}</th>`;
  }

  html += '</tr></thead><tbody>';

  for(const r of preview){
    const flag = r['Review Flag'] === 'Y';
    html += `<tr class="${flag ? 'flag' : ''}">`;

    for(const [name, cls] of C){
      const value = r[name] == null ? '' : String(r[name]);

      if(name === 'Review Flag'){
        html += flag
          ? `<td><span class="pill pill-wn" title="${escapeHtml(r['Review Reason'] || '')}">확인 필요</span></td>`
          : `<td><span class="pill pill-ok">정상</span></td>`;
      } else {
        html += `<td class="${cls}${value ? '' : ' dim'}" title="${escapeHtml(value)}">${value ? escapeHtml(value) : '—'}</td>`;
      }
    }

    html += '</tr>';
  }

  html += '</tbody></table>';

  document.getElementById('tbl').innerHTML = html;
  document.getElementById('results').style.display = 'block';
  document.getElementById('results').scrollIntoView({behavior: 'smooth', block: 'start'});
}

function downloadXlsx(){
  if(!rows.length) return;

  const wb = XLSX.utils.book_new();

  const data = rows.map(r => {
    const o = {};
    for(const c of OUTPUT_COLUMNS){
      o[c] = r[c] ?? '';
    }
    return o;
  });

  const ws = XLSX.utils.json_to_sheet(data, {header: OUTPUT_COLUMNS});
  XLSX.utils.book_append_sheet(wb, ws, '전체');

  const endUsers = [...new Set(rows.map(r => r['납품처명'] || '미분류'))];
  const used = new Set(['전체']);

  for(const eu of endUsers){
    const subset = rows.filter(r => (r['납품처명'] || '미분류') === eu);
    let sheetName = String(eu || '미분류').replace(/[:\\/?*\[\]]/g,'').trim().slice(0,31) || '미분류';

    let base = sheetName;
    let n = 2;

    while(used.has(sheetName)){
      sheetName = base.slice(0,28) + '_' + n;
      n++;
    }

    used.add(sheetName);

    const ws2 = XLSX.utils.json_to_sheet(
      subset.map(r => {
        const o = {};
        for(const c of OUTPUT_COLUMNS){
          o[c] = r[c] ?? '';
        }
        return o;
      }),
      {header: OUTPUT_COLUMNS}
    );

    XLSX.utils.book_append_sheet(wb, ws2, sheetName);
  }

  XLSX.writeFile(wb, 'invoice_extracted.xlsx');
}

  files = [];
  rows = [];
  rawLines = [];
  docStats = [];

  fi.value = '';
  renderFiles();

  document.getElementById('console').innerHTML = '';
  document.getElementById('console').classList.remove('on');
  document.getElementById('prog').classList.remove('on');

  document.getElementById('rawBtn').style.display = 'none';
  document.getElementById('meta2').textContent = '대기 중';
  document.getElementById('progFill').style.width = '0%';
  document.getElementById('progPct').textContent = '0%';

  window.scrollTo({top:0, behavior:'smooth'});
}
